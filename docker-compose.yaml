services:
  tailscale:
    image: tailscale/tailscale:stable
    hostname: ${TS_HOSTNAME:-shared-feed-relay}
    environment:
      - TS_AUTHKEY
      - TS_AUTH_ONCE=true
      - TS_HOSTNAME=${TS_HOSTNAME:-shared-feed-relay}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    restart: unless-stopped

  shared-feed-relay:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: service:tailscale
    depends_on:
      - tailscale
    environment:
      - TARGET_HOST=${TARGET_HOST:-100.64.19.108}
      - TARGET_PORT=${TARGET_PORT:-12001}
      - LISTEN_PORT=${LISTEN_PORT:-12002}
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 \"$${LISTEN_PORT:-12002}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  tailscale-state:
